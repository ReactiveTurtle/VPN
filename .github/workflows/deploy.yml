name: deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      target: ${{ steps.meta.outputs.target }}
      host_port: ${{ steps.meta.outputs.host_port }}
      runtime_env_file: ${{ steps.meta.outputs.runtime_env_file }}
      compose_project: ${{ steps.meta.outputs.compose_project }}
      api_image: ${{ steps.images.outputs.api_image }}
      migrations_image: ${{ steps.images.outputs.migrations_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deployment metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TARGET="production"
          else
            TARGET="staging"
          fi

          case "$TARGET" in
            production)
              HOST_PORT="5000"
              RUNTIME_ENV_FILE="/etc/vpnportal/vpnportal.production.container.env"
              COMPOSE_PROJECT="vpnportal-production"
              ;;
            staging)
              HOST_PORT="5001"
              RUNTIME_ENV_FILE="/etc/vpnportal/vpnportal.staging.container.env"
              COMPOSE_PROJECT="vpnportal-staging"
              ;;
            *)
              echo "Unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "host_port=${HOST_PORT}" >> "$GITHUB_OUTPUT"
          echo "runtime_env_file=${RUNTIME_ENV_FILE}" >> "$GITHUB_OUTPUT"
          echo "compose_project=${COMPOSE_PROJECT}" >> "$GITHUB_OUTPUT"

      - name: Compute image names
        id: images
        shell: bash
        run: |
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]]; then
            echo "Missing required secret: DOCKERHUB_USERNAME" >&2
            exit 1
          fi

          API_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/vpnportal-api:${{ steps.meta.outputs.version }}"
          MIGRATIONS_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/vpnportal-migrations:${{ steps.meta.outputs.version }}"

          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "migrations_image=${MIGRATIONS_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/VpnPortal.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api_image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vpnportal-api:${{ steps.meta.outputs.target }}

      - name: Build and push migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/VpnPortal.Migrations/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.migrations_image }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vpnportal-migrations:${{ steps.meta.outputs.target }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          }

          require_secret DEPLOY_HOST "${{ secrets.DEPLOY_HOST }}"
          require_secret DEPLOY_PORT "${{ secrets.DEPLOY_PORT }}"
          require_secret DEPLOY_USER "${{ secrets.DEPLOY_USER }}"
          require_secret DEPLOY_PATH "${{ secrets.DEPLOY_PATH }}"
          require_secret DEPLOY_SSH_PRIVATE_KEY "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}"
          require_secret DOCKERHUB_USERNAME "${{ secrets.DOCKERHUB_USERNAME }}"
          require_secret DOCKERHUB_TOKEN "${{ secrets.DOCKERHUB_TOKEN }}"
          require_secret APP_DATABASE_CONNECTION_STRING "${{ secrets.APP_DATABASE_CONNECTION_STRING }}"
          require_secret APP_EMAIL_HOST "${{ secrets.APP_EMAIL_HOST }}"
          require_secret APP_EMAIL_USERNAME "${{ secrets.APP_EMAIL_USERNAME }}"
          require_secret APP_EMAIL_PASSWORD "${{ secrets.APP_EMAIL_PASSWORD }}"
          require_secret APP_EMAIL_FROM_EMAIL "${{ secrets.APP_EMAIL_FROM_EMAIL }}"
          require_secret APP_EMAIL_FROM_NAME "${{ secrets.APP_EMAIL_FROM_NAME }}"
          require_secret APP_EMAIL_PUBLIC_BASE_URL "${{ secrets.APP_EMAIL_PUBLIC_BASE_URL }}"
          require_secret APP_INTERNAL_API_SHARED_SECRET "${{ secrets.APP_INTERNAL_API_SHARED_SECRET }}"
          require_secret APP_VPN_ACCESS_SERVER_ADDRESS "${{ secrets.APP_VPN_ACCESS_SERVER_ADDRESS }}"
          require_secret APP_VPN_RUNTIME_DISCONNECT_SCRIPT_PATH "${{ secrets.APP_VPN_RUNTIME_DISCONNECT_SCRIPT_PATH }}"

          if [[ "$missing" -ne 0 ]]; then
            echo "Configure the missing secrets in the GitHub Environment: ${{ needs.build.outputs.target }}" >&2
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add target host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Render runtime env file
        shell: bash
        run: |
          case "${{ needs.build.outputs.target }}" in
            production)
              ASPNETCORE_ENVIRONMENT="Production"
              ;;
            staging)
              ASPNETCORE_ENVIRONMENT="Staging"
              ;;
            *)
              echo "Unsupported deployment target: ${{ needs.build.outputs.target }}" >&2
              exit 1
              ;;
          esac

          cat > vpnportal.container.env <<EOF
          ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
          Database__ConnectionString=${{ secrets.APP_DATABASE_CONNECTION_STRING }}
          Email__Enabled=true
          Email__Provider=Smtp
          Email__Host=${{ secrets.APP_EMAIL_HOST }}
          Email__Port=587
          Email__UseSsl=true
          Email__Username=${{ secrets.APP_EMAIL_USERNAME }}
          Email__Password=${{ secrets.APP_EMAIL_PASSWORD }}
          Email__FromEmail=${{ secrets.APP_EMAIL_FROM_EMAIL }}
          Email__FromName=${{ secrets.APP_EMAIL_FROM_NAME }}
          Email__PublicBaseUrl=${{ secrets.APP_EMAIL_PUBLIC_BASE_URL }}
          InternalApi__SharedSecret=${{ secrets.APP_INTERNAL_API_SHARED_SECRET }}
          VpnAccess__ServerAddress=${{ secrets.APP_VPN_ACCESS_SERVER_ADDRESS }}
          VpnRuntime__DisconnectScriptPath=${{ secrets.APP_VPN_RUNTIME_DISCONNECT_SCRIPT_PATH }}
          EOF

      - name: Upload compose and env assets
        run: |
          scp -P "${{ secrets.DEPLOY_PORT }}" deploy/docker/docker-compose.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"
          scp -P "${{ secrets.DEPLOY_PORT }}" vpnportal.container.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/vpnportal.container.env.tmp"

      - name: Deploy Docker images
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
          "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' RUNTIME_ENV_FILE='${{ needs.build.outputs.runtime_env_file }}' HOST_PORT='${{ needs.build.outputs.host_port }}' COMPOSE_PROJECT='${{ needs.build.outputs.compose_project }}' API_IMAGE='${{ needs.build.outputs.api_image }}' MIGRATIONS_IMAGE='${{ needs.build.outputs.migrations_image }}' DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' bash -s" <<'EOF'
          set -euo pipefail

          test -d "$DEPLOY_PATH"
          test -f "$DEPLOY_PATH/docker-compose.yml"
          test -f "$DEPLOY_PATH/vpnportal.container.env.tmp"

          sudo install -d -m 0755 /etc/vpnportal
          sudo install -m 0640 "$DEPLOY_PATH/vpnportal.container.env.tmp" "$RUNTIME_ENV_FILE"
          rm -f "$DEPLOY_PATH/vpnportal.container.env.tmp"

          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          export VPNPORTAL_API_IMAGE="$API_IMAGE"
          export VPNPORTAL_MIGRATIONS_IMAGE="$MIGRATIONS_IMAGE"
          export VPNPORTAL_RUNTIME_ENV_FILE="$RUNTIME_ENV_FILE"
          export VPNPORTAL_HOST_PORT="$HOST_PORT"

          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" pull api migrations
          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" run --rm migrations
          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" up -d api
          EOF
