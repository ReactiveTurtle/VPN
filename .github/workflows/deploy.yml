name: deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: prod
        type: choice
        options:
          - stage
          - prod
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      target: ${{ steps.meta.outputs.target }}
      host_port: ${{ steps.meta.outputs.host_port }}
      runtime_env_file: ${{ steps.meta.outputs.runtime_env_file }}
      nginx_site_name: ${{ steps.meta.outputs.nginx_site_name }}
      compose_project: ${{ steps.meta.outputs.compose_project }}
      source_archive: ${{ steps.meta.outputs.source_archive }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deployment metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TARGET="${{ github.event.inputs.target }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TARGET="prod"
          else
            TARGET="stage"
          fi

          case "$TARGET" in
            prod)
              HOST_PORT="5000"
              RUNTIME_ENV_FILE="/etc/vpnportal/vpnportal.prod.container.env"
              NGINX_SITE_NAME="vpnportal.conf"
              COMPOSE_PROJECT="vpnportal-prod"
              ;;
            stage)
              HOST_PORT="5001"
              RUNTIME_ENV_FILE="/etc/vpnportal/vpnportal.stage.container.env"
              NGINX_SITE_NAME="vpnportal-stage.conf"
              COMPOSE_PROJECT="vpnportal-stage"
              ;;
            *)
              echo "Unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac

          SOURCE_ARCHIVE="vpnportal-source-${TARGET}-${VERSION}.tar.gz"
          ARTIFACT_NAME="vpnportal-source-${TARGET}-${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "host_port=${HOST_PORT}" >> "$GITHUB_OUTPUT"
          echo "runtime_env_file=${RUNTIME_ENV_FILE}" >> "$GITHUB_OUTPUT"
          echo "nginx_site_name=${NGINX_SITE_NAME}" >> "$GITHUB_OUTPUT"
          echo "compose_project=${COMPOSE_PROJECT}" >> "$GITHUB_OUTPUT"
          echo "source_archive=${SOURCE_ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: git archive --format=tar.gz --output "${{ steps.meta.outputs.source_archive }}" HEAD

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.source_archive }}
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: package
    environment: ${{ needs.package.outputs.target }}

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.artifact_name }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          }

          require_secret DEPLOY_HOST "${{ secrets.DEPLOY_HOST }}"
          require_secret DEPLOY_PORT "${{ secrets.DEPLOY_PORT }}"
          require_secret DEPLOY_USER "${{ secrets.DEPLOY_USER }}"
          require_secret DEPLOY_PATH "${{ secrets.DEPLOY_PATH }}"
          require_secret DEPLOY_SSH_PRIVATE_KEY "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}"

          if [[ "$missing" -ne 0 ]]; then
            echo "Configure the missing deploy secrets in the GitHub Environment: ${{ needs.package.outputs.target }}" >&2
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add target host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Render host predeploy env file
        shell: bash
        run: |
          cat > vpnportal.predeploy.env <<EOF
          DEPLOY_ENV_NAME=${{ needs.package.outputs.target }}
          DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER=${{ secrets.DEPLOY_USER }}
          NGINX_PORTAL_SERVER_NAME=${{ secrets.DEPLOY_HOST }}
          RUNTIME_ENV_FILE=${{ needs.package.outputs.runtime_env_file }}
          NGINX_SITE_NAME=${{ needs.package.outputs.nginx_site_name }}
          APP_PORT=${{ needs.package.outputs.host_port }}
          EOF

      - name: Deploy predeploy scripts
        run: |
          tar -czf vpnportal-predeploy.tar.gz deploy/predeploy/
          scp -P "${{ secrets.DEPLOY_PORT }}" vpnportal-predeploy.tar.gz "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/vpnportal-predeploy.tar.gz"
          scp -P "${{ secrets.DEPLOY_PORT }}" vpnportal.predeploy.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/vpnportal.predeploy.env.tmp"

      - name: Extract predeploy scripts on target
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
          "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' TARGET='${{ needs.package.outputs.target }}' bash -s" <<'EOF'
          set -euo pipefail
          sudo install -d -m 0755 /etc/vpnportal
          test -d "$DEPLOY_PATH"
          test -f "$DEPLOY_PATH/vpnportal-predeploy.tar.gz"
          test -f "$DEPLOY_PATH/vpnportal.predeploy.env.tmp"
          rm -rf "$DEPLOY_PATH/predeploy"
          install -d -m 0755 "$DEPLOY_PATH/predeploy"
          tar -xzf "$DEPLOY_PATH/vpnportal-predeploy.tar.gz" -C "$DEPLOY_PATH/predeploy" --strip-components=2
          rm -f "$DEPLOY_PATH/vpnportal-predeploy.tar.gz"
          sudo install -m 0640 "$DEPLOY_PATH/vpnportal.predeploy.env.tmp" "/etc/vpnportal/predeploy.$TARGET.env"
          rm -f "$DEPLOY_PATH/vpnportal.predeploy.env.tmp"
          EOF

      - name: Validate application secrets
        shell: bash
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          }

          require_secret DATABASE__CONNECTIONSTRING "${{ secrets.DATABASE__CONNECTIONSTRING }}"
          require_secret EMAIL__HOST "${{ secrets.EMAIL__HOST }}"
          require_secret EMAIL__USERNAME "${{ secrets.EMAIL__USERNAME }}"
          require_secret EMAIL__PASSWORD "${{ secrets.EMAIL__PASSWORD }}"
          require_secret EMAIL__FROMEMAIL "${{ secrets.EMAIL__FROMEMAIL }}"
          require_secret EMAIL__FROMNAME "${{ secrets.EMAIL__FROMNAME }}"
          require_secret EMAIL__PUBLICBASEURL "${{ secrets.EMAIL__PUBLICBASEURL }}"
          require_secret INTERNALAPI__SHAREDSECRET "${{ secrets.INTERNALAPI__SHAREDSECRET }}"
          require_secret VPNACCESS__SERVERADDRESS "${{ secrets.VPNACCESS__SERVERADDRESS }}"
          require_secret VPNRUNTIME__DISCONNECTSCRIPTPATH "${{ secrets.VPNRUNTIME__DISCONNECTSCRIPTPATH }}"

          if [[ "$missing" -ne 0 ]]; then
            echo "Configure the missing application secrets in the GitHub Environment: ${{ needs.package.outputs.target }}" >&2
            exit 1
          fi

      - name: Render runtime env file
        shell: bash
        run: |
          case "${{ needs.package.outputs.target }}" in
            prod)
              ASPNETCORE_ENVIRONMENT="prod"
              ;;
            stage)
              ASPNETCORE_ENVIRONMENT="stage"
              ;;
            *)
              echo "Unsupported deployment target: ${{ needs.package.outputs.target }}" >&2
              exit 1
              ;;
          esac

          cat > vpnportal.container.env <<EOF
          ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
          Database__ConnectionString=${{ secrets.DATABASE__CONNECTIONSTRING }}
          Email__Enabled=true
          Email__Provider=Smtp
          Email__Host=${{ secrets.EMAIL__HOST }}
          Email__Port=587
          Email__UseSsl=true
          Email__Username=${{ secrets.EMAIL__USERNAME }}
          Email__Password=${{ secrets.EMAIL__PASSWORD }}
          Email__FromEmail=${{ secrets.EMAIL__FROMEMAIL }}
          Email__FromName=${{ secrets.EMAIL__FROMNAME }}
          Email__PublicBaseUrl=${{ secrets.EMAIL__PUBLICBASEURL }}
          InternalApi__SharedSecret=${{ secrets.INTERNALAPI__SHAREDSECRET }}
          VpnAccess__ServerAddress=${{ secrets.VPNACCESS__SERVERADDRESS }}
          VpnRuntime__DisconnectScriptPath=${{ secrets.VPNRUNTIME__DISCONNECTSCRIPTPATH }}
          EOF

      - name: Upload source artifact
        run: |
          scp -P "${{ secrets.DEPLOY_PORT }}" "${{ needs.package.outputs.source_archive }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/${{ needs.package.outputs.source_archive }}"
          scp -P "${{ secrets.DEPLOY_PORT }}" vpnportal.container.env "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/vpnportal.container.env.tmp"

      - name: Build and deploy on target host
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
          "DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' TARGET='${{ needs.package.outputs.target }}' SOURCE_ARCHIVE='${{ needs.package.outputs.source_archive }}' RUNTIME_ENV_FILE='${{ needs.package.outputs.runtime_env_file }}' HOST_PORT='${{ needs.package.outputs.host_port }}' COMPOSE_PROJECT='${{ needs.package.outputs.compose_project }}' VERSION='${{ needs.package.outputs.version }}' bash -s" <<'EOF'
          set -euo pipefail

          PREDESPLOY_ROOT="$DEPLOY_PATH/predeploy"

          RELEASE_ROOT="$DEPLOY_PATH/releases"
          RELEASE_DIR="$RELEASE_ROOT/$VERSION"

          test -d "$DEPLOY_PATH"
          test -f "$DEPLOY_PATH/$SOURCE_ARCHIVE"
          test -f "$DEPLOY_PATH/vpnportal.container.env.tmp"

          install -d -m 0755 "$RELEASE_ROOT"
          rm -rf "$RELEASE_DIR"
          install -d -m 0755 "$RELEASE_DIR"
          tar -xzf "$DEPLOY_PATH/$SOURCE_ARCHIVE" -C "$RELEASE_DIR"

          install -m 0644 "$RELEASE_DIR/deploy/docker/docker-compose.yml" "$DEPLOY_PATH/docker-compose.yml"
          sudo install -d -m 0755 /etc/vpnportal
          sudo install -m 0640 "$DEPLOY_PATH/vpnportal.container.env.tmp" "$RUNTIME_ENV_FILE"
          rm -f "$DEPLOY_PATH/vpnportal.container.env.tmp"

          export VPNPORTAL_BUILD_CONTEXT="$RELEASE_DIR"
          export VPNPORTAL_API_IMAGE="vpnportal-api:$VERSION"
          export VPNPORTAL_MIGRATIONS_IMAGE="vpnportal-migrations:$VERSION"
          export VPNPORTAL_RUNTIME_ENV_FILE="$RUNTIME_ENV_FILE"
          export VPNPORTAL_HOST_PORT="$HOST_PORT"

          VPN_HOST_ENV_FILE="/etc/vpnportal/vpn-host.$TARGET.env"
          STRONGSWAN_DEPLOY_SCRIPT="$RELEASE_DIR/deploy/host/apply-strongswan-config.sh"

          if [ -f "$VPN_HOST_ENV_FILE" ]; then
            sudo bash "$STRONGSWAN_DEPLOY_SCRIPT" "$VPN_HOST_ENV_FILE"
          else
            echo "Skipping strongSwan config refresh; bootstrap env not found at $VPN_HOST_ENV_FILE"
          fi

          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" build api migrations
          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" run --rm migrations
          docker compose --project-name "$COMPOSE_PROJECT" -f "$DEPLOY_PATH/docker-compose.yml" up -d api

          ln -sfn "$RELEASE_DIR" "$DEPLOY_PATH/current"
          EOF
