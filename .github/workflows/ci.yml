name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/VpnPortal.Web/package-lock.json

      - name: Restore backend
        run: dotnet restore VpnPortal.slnx

      - name: Build backend
        run: dotnet build VpnPortal.slnx --configuration Release --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/VpnPortal.Web

      - name: Build frontend
        run: npm run build
        working-directory: src/VpnPortal.Web
