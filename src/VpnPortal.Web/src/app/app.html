<div class="app-shell">
  <header class="topbar">
    <div class="topbar-inner">
      <a routerLink="/" class="brand-block">
        <span class="brand-kicker">Secure Access</span>
        <span class="brand">NorthGate VPN Portal</span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>

        @if (isUser()) {
          <a routerLink="/dashboard" routerLinkActive="active">Workspace</a>
        } @else if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active">Operations</a>
        } @else {
          <a routerLink="/login" routerLinkActive="active">User Sign In</a>
          <a routerLink="/admin/login" routerLinkActive="active">Admin Sign In</a>
        }
      </nav>

      <div class="session-area">
        @if (currentUser(); as user) {
          <div class="session-summary">
            <span class="session-role">{{ user.role === 'SuperAdmin' ? 'Superadmin session' : 'User workspace' }}</span>
            <strong>{{ user.login }}</strong>
          </div>
          <button type="button" class="button ghost compact" (click)="logout()">Logout</button>
        } @else {
          <a routerLink="/" fragment="request-access" class="button secondary compact">Request access</a>
        }
      </div>
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
