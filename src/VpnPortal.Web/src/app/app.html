<div class="app-shell">
  <header class="topbar">
    <div class="topbar-inner">
      <a routerLink="/" class="brand-block">
        <span class="brand">Moonbridge VPN</span>
      </a>

      <nav class="main-nav" aria-label="Основная навигация">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Главная</a>

        @if (isUser()) {
          <a routerLink="/dashboard" routerLinkActive="active">Личный кабинет</a>
        } @else if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active">Суперадминка</a>
        }
      </nav>

      <div class="session-area">
        @if (currentUser(); as user) {
          <div class="session-summary">
            <span class="session-role">{{ roleLabel(user.role) }}</span>
            <strong>{{ sessionIdentity() }}</strong>
          </div>
          <button type="button" class="button ghost compact" (click)="logout()">Выйти</button>
        } @else {
          <a routerLink="/login" class="button primary compact">Войти</a>
        }
      </div>
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
