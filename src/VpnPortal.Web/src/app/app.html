<div class="app-shell">
  <header class="topbar">
    <div class="topbar-inner">
      <a routerLink="/" class="brand-block">
        <span class="brand-kicker">Безопасный доступ</span>
        <span class="brand">NorthGate VPN Portal</span>
      </a>

      <nav class="main-nav" aria-label="Основная навигация">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Главная</a>

        @if (isUser()) {
          <a routerLink="/dashboard" routerLinkActive="active">Кабинет</a>
        } @else if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active">Операции</a>
        } @else {
          <a routerLink="/login" routerLinkActive="active">Вход для пользователя</a>
          <a routerLink="/admin/login" routerLinkActive="active">Вход для администратора</a>
        }
      </nav>

      <div class="session-area">
        @if (currentUser(); as user) {
          <div class="session-summary">
            <span class="session-role">{{ roleLabel(user.role) }}</span>
            <strong>{{ user.login }}</strong>
          </div>
          <button type="button" class="button ghost compact" (click)="logout()">Выйти</button>
        } @else {
          <a routerLink="/" fragment="request-access" class="button secondary compact">Запросить доступ</a>
        }
      </div>
    </div>
  </header>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
